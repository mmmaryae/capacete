<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamCore - Login</title>
    <link rel="icon" href="{{ url_for('static', filename='imagens.img/Logo.png') }}" type="image/png">
    <link rel="icon2" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="camcore-auth-bg">
    <!-- ===== NAVBAR ===== -->
    <header class="navbar">

        <div class="logo-area">
            <img src="{{url_for('static', filename= 'imagens.img/Logo.png')}}" class="logo-icon">
            <span class="logo-text">CamCore</span>
        </div>

        <!-- MENU DESKTOP -->
        <nav class="menu-desktop" id="menuDesktop">
            <a href="{{url_for('home')}}">Inicio</a>
            <a href="{{ url_for('login')}}" class="btn-login">Login</a>
            <a href="{{ url_for('cadastro')}}" class="btn-cadastro">Cadastro</a>
        </nav>

        <!-- BOTÃO HAMBURGUER -->
        <div class="menu-toggle" id="menuToggle">
            ☰
        </div>

    </header>

<!-- Formulário -->
    <main>
        <body>
            <form class="login-card" action="/login" method="POST">
                {{ form.hidden_tag() }}
                <h2>Login</h2>

                <div class="form-group">
                    <div class="icon">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                        </svg>
                    </div>
                    {{ form.email(class="input-field", placeholder="Email") }}
                </div>

                <div class="form-group">
                    <div class="icon">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z" />
                        </svg>
                    </div>
                    {{ form.senha(class="input-field", placeholder="Senha") }}

                </div>
                <a href="{{ url_for('reset_senha') }}" class="forgot-password">Esqueci minha senha</a>
                


                {{ form.botao_confimacao(class="btn-submit") }}
                <p>Ainda não tem conta?<a href="{{ url_for('cadastro') }}" class="new-account">Crie uma agora </a></p>
            </form>
        </body>
    </main>
